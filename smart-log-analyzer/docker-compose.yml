version: '3.8'

services:

  # ── Flask ML API ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-log-api
    ports:
      - "5000:5000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5001
    depends_on:
      - mlflow
    networks:
      - monitoring
    restart: unless-stopped

  # ── Streamlit UI ────────────────────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: smart-log-ui
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://app:5000
    depends_on:
      - app
    networks:
      - monitoring
    restart: unless-stopped

  # ── MLflow Tracking Server ──────────────────────────────────────────
  mlflow:
    image: python:3.10-slim
    container_name: smart-log-mlflow
    command: >
      bash -c "pip install mlflow -q &&
               mlflow server
               --host 0.0.0.0
               --port 5001
               --default-artifact-root /mlflow/artifacts
               --backend-store-uri sqlite:///mlflow/mlflow.db"
    ports:
      - "5001:5001"
    volumes:
      - mlflow_data:/mlflow
    networks:
      - monitoring
    restart: unless-stopped

  # ── Prometheus ──────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: smart-log-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - monitoring
    restart: unless-stopped

  # ── Grafana ─────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: smart-log-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_SECURITY_ADMIN_USER=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - monitoring
    restart: unless-stopped

networks:
  monitoring:
    driver: bridge

volumes:
  mlflow_data:
  grafana_data:
