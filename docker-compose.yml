

services:

  app:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - mlflow
    networks:
      - monitoring

  mlflow:
    image: python:3.10-slim
    command: bash -c "pip install mlflow -q && mlflow server --host 0.0.0.0 --port 5001 --backend-store-uri sqlite:////mlflow_data/mlflow.db --allowed-hosts '*'"
    ports:
      - "5001:5001"
    volumes:
      - mlflow_data:/mlflow_data
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  mlflow_data:
  grafana_data: